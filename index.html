    <style>
        /* Dodatkowe poprawki ułatwiające estetyczny wydruk */
        @media print {
            body {
                background-color: white !important;
            }

            body> :not(#print-area) {
                display: none !important;
            }

            #print-area {
                display: block !important;
                width: 100%;
            }
        }

        /* Tryb Wysokiego Kontrastu */
        body.high-contrast {
            background-color: #000 !important;
            color: #ff0 !important;
        }

        body.high-contrast * {
            background-color: #000 !important;
            border-color: #ff0 !important;
            color: #ff0 !important;
        }

        body.high-contrast button {
            border: 2px solid #ff0 !important;
        }

        body.high-contrast img {
            filter: grayscale(100%) contrast(150%);
            border: 1px solid #ff0;
        }

        /* Checkboxy schowka */
        .print-checkbox {
            accent-color: #16a34a;
        }

        body.high-contrast .print-checkbox {
            accent-color: #ff0;
        }
    </style>
</head>

        // LOGIKA GENEROWANIA HTML
        let currentSearchQuery = '';

        function toggleHighContrast() {
            document.body.classList.toggle('high-contrast');
        }

        function changeFontSize(step) {
            currentFontSize += step * 2;
            if (currentFontSize < 12) currentFontSize = 12;
            if (currentFontSize > 28) currentFontSize = 28;
            document.documentElement.style.fontSize = currentFontSize + 'px';
        }

        function togglePrintSelection(itemName) {
            if (selectedItems.has(itemName)) {
                selectedItems.delete(itemName);
            } else {
                selectedItems.add(itemName);
            }
            document.getElementById('selectedCount').innerText = selectedItems.size;
            renderCatalog();
        }

        function generatePrintView(itemsToPrint, title) {
            let printContainer = document.getElementById('print-area');
            if (!printContainer) {
                printContainer = document.createElement('div');
                printContainer.id = 'print-area';
                document.body.appendChild(printContainer);
            }

            printContainer.className = 'hidden print:block w-full text-black';

            let html = `
                <div class="mb-8 flex justify-between items-end border-b-2 border-gray-800 pb-4">
                    <h1 class="text-3xl font-bold uppercase tracking-wider">${title}</h1>
                    <img src="images/logotypy.png" alt="Logotypy projektu" class="h-16 object-contain" onerror="this.style.display='none'">
                </div>
                <div class="grid grid-cols-1 gap-8">
            `;

            itemsToPrint.forEach(item => {
                let featuresHtml = item.features.map(f => `<li class="border border-gray-400 px-3 py-1 rounded-lg text-sm font-bold bg-white">${f}</li>`).join('');
                html += `
                    <div class="flex flex-row gap-8 border-2 border-gray-800 rounded-2xl p-6" style="page-break-inside: avoid; height: 38vh;">
                        <div class="w-2/5 h-full flex items-center justify-center p-4">
                            ${item.imageUrl ? `<img src="${item.imageUrl}" class="max-w-full max-h-full object-contain" />` : '<span class="text-gray-400">Brak zdjęcia</span>'}
                        </div>
                        <div class="w-3/5 flex flex-col justify-start">
                            <h3 class="text-2xl font-extrabold mb-3">${item.name}</h3>
                            <p class="text-lg text-gray-800 mb-6">${item.desc}</p>
                            <ul class="flex flex-wrap gap-2 mt-auto">
                                ${featuresHtml}
                            </ul>
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            printContainer.innerHTML = html;
        }

        function printSelected() {
            if (selectedItems.size === 0) {
                alert("Najpierw zaznacz na kartach produktów przynajmniej jeden sprzęt do wydruku.");
                return;
            }

            let selectedProducts = [];
            catalogData.forEach(dept => {
                dept.categories.forEach(cat => {
                    cat.items.forEach(item => {
                        if (selectedItems.has(item.name)) selectedProducts.push(item);
                    });
                });
            });

            generatePrintView(selectedProducts, "Wybrane Sprzęty - OWiT Toruń");
            window.print();
        }

        function printAll() {
            let allItems = [];
            catalogData.forEach(dept => {
                dept.categories.forEach(cat => {
                    allItems.push(...cat.items);
                });
            });
            generatePrintView(allItems, "Pełny Katalog Sprzętu OWiT Toruń");
            window.print();
        }

        document.body.insertAdjacentHTML('beforeend', `

            </button>
        `);
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('scrollToTopBtn');
            if (window.scrollY > 300) {
                btn.classList.remove('opacity-0', 'pointer-events-none');
                btn.classList.add('opacity-100');
            } else {
                btn.classList.add('opacity-0', 'pointer-events-none');
                btn.classList.remove('opacity-100');
            }
        });

        function populateCategoryFilter() {
            const categorySelect = document.getElementById('categorySelect');
            if (!categorySelect) return;

            categorySelect.innerHTML = '<option value="all">Wszystkie kategorie</option>';
            currentCategoryFilter = 'all';

            if (currentFilter === 'all') {
                categorySelect.disabled = true;
                categorySelect.classList.add('bg-gray-100', 'opacity-50');
                categorySelect.classList.remove('bg-white');
            } else {
                categorySelect.disabled = false;
                categorySelect.classList.remove('bg-gray-100', 'opacity-50');
                categorySelect.classList.add('bg-white');

                const deptIdx = parseInt(currentFilter);
                const department = catalogData[deptIdx];
                if (department) {
                    department.categories.forEach((cat, idx) => {
                        const option = document.createElement('option');
                        option.value = idx.toString();
                        option.textContent = cat.category;
                        categorySelect.appendChild(option);
                    });
                }
            }
        }

            const container = document.getElementById('catalog-container');
            let htmlContent = '';

            let processedData = catalogData.map((department, deptIdx) => {
                if (currentFilter !== 'all' && deptIdx.toString() !== currentFilter) {
                    return null;
                }

                let filteredCategories = department.categories.map((category, catIdx) => {
                    if (currentCategoryFilter !== 'all' && catIdx.toString() !== currentCategoryFilter && deptIdx.toString() === currentFilter) {
                        return null;
                    }

                    let filteredItems = category.items.filter(item => {
                        const searchStr = currentSearchQuery.toLowerCase();
                        if (!searchStr) return true;

                        return item.name.toLowerCase().includes(searchStr) ||
                            item.desc.toLowerCase().includes(searchStr) ||
                            item.features.some(f => f.toLowerCase().includes(searchStr));
                    });

                    if (currentSort === 'name_asc') {
                        filteredItems.sort((a, b) => a.name.localeCompare(b.name, 'pl'));
                    } else if (currentSort === 'name_desc') {
                        filteredItems.sort((a, b) => b.name.localeCompare(a.name, 'pl'));
                    }

                    if (filteredItems.length === 0) return null;

                    return { ...category, items: filteredItems };
                }).filter(cat => cat !== null);

                if (filteredCategories.length === 0) return null;

                return { ...department, categories: filteredCategories };
            }).filter(dept => dept !== null);

            if (processedData.length === 0) {
                container.innerHTML = '<div class="text-center py-20 text-gray-500 text-xl font-medium">Brak wyników spełniających kryteria...</div>';
                return;
            }

            processedData.forEach((department, deptIdx) => {
                const pageBreakClass = deptIdx === 0 ? '' : 'page-break';
                const deptHasSelected = department.categories.some(c => c.items.some(i => selectedItems.has(i.name)));
                const deptSelectedClass = deptHasSelected ? 'has-selected' : '';

                htmlContent += `
                    <div class="department-section ${pageBreakClass} ${deptSelectedClass}">
                        <!-- Tytuł Działu -->
                        <div class="text-center md:text-left mb-12 bg-green-800 text-white p-8 rounded-2xl print:bg-transparent print:text-black print:p-0 print:border-b-4 print:border-green-800 print:rounded-none print-hide-bg">
                            <h1 class="text-3xl md:text-4xl font-bold mb-4">${department.departmentTitle}</h1>
                            <p class="text-green-100 print:text-gray-600 text-lg">${department.departmentDesc}</p>
                        </div>

                        <div class="space-y-16">
                `;

                department.categories.forEach((section, catIdx) => {
                    const catHasSelected = section.items.some(i => selectedItems.has(i.name));
                    const catSelectedClass = catHasSelected ? 'has-selected' : '';

                    htmlContent += `
                        <div class="category-section ${catSelectedClass}">
                            <!-- Tytuł Kategorii -->
                            <div class="flex items-center gap-3 mb-6 border-b-2 border-green-100 pb-3">
                                <div class="p-2 bg-green-100 text-green-700 rounded-lg print:bg-transparent print:p-0">
                                    <i data-lucide="${section.icon}" class="w-6 h-6"></i>
                                </div>
                                <h2 class="text-2xl font-semibold text-gray-800">${section.category}</h2>
                            </div>

                            <!-- Siatka Produktów -->
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 print:block print:space-y-12">
                    `;

                    section.items.forEach(item => {
                        const isSelected = selectedItems.has(item.name);
                        const selectedClass = isSelected ? 'ring-2 ring-green-500 bg-green-50 selected-for-print' : 'bg-white';
                        const checkedAttr = isSelected ? 'checked' : '';

                        let imageArea = '';
                        if (item.imageUrl) {
                            imageArea = `<img src="${item.imageUrl}" alt="${item.name}" loading="lazy" onerror="this.outerHTML='<div class=\\'flex flex-col items-center justify-center p-4 h-full text-gray-400\\'><i data-lucide=\\'image-off\\' class=\\'w-8 h-8 mb-2 opacity-50\\'></i><span class=\\'text-xs font-medium\\'>Brak zdjęcia</span></div>'; if (typeof lucide !== \\'undefined\\') lucide.createIcons();" class="w-full h-full object-contain p-2" />`;
                        } else {
                            imageArea = `
                                <i data-lucide="zap" class="w-8 h-8 mb-2 opacity-20"></i>
                                <span class="text-sm font-medium text-center p-4">[Zdjęcie: ${item.name}]</span>
                                <div class="absolute inset-0 bg-green-50/90 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity print-hide">
                                    <p class="text-sm text-green-700 font-medium px-4 text-center">Dodaj link w parametrze imageUrl.</p>
                                </div>
                            `;
                        }

                        let featuresHtml = item.features.map(f =>
                            `<li class="text-[11px] uppercase tracking-wider font-semibold bg-gray-50 text-gray-600 px-2 py-1 rounded border border-gray-200">${f}</li>`
                        ).join('');

                        const searchUrl = `https://www.google.com/search?q=${encodeURIComponent(item.name)}`;

                        htmlContent += `
                            <div class="product-card relative ${selectedClass} rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col avoid-break print:shadow-none print:border-gray-300 transition-all hover:shadow-md hover:border-blue-300 group">
                                <!-- Checkbox do zaznaczania do druku -->
                                <div class="absolute top-3 right-3 z-10 print-hide" onclick="event.stopPropagation()">
                                    <input type="checkbox" onchange="togglePrintSelection('${item.name.replace(/'/g, "\\'")}')" class="print-checkbox w-6 h-6 cursor-pointer rounded border-gray-300 shadow-sm transition-all" ${checkedAttr} aria-label="Zaznacz do druku">
                                </div>
                                <!-- Miejsce na zdjęcie -->
                                <div class="aspect-[4/3] bg-white border-b border-gray-200 flex flex-col items-center justify-center text-gray-400 relative overflow-hidden group-hover:opacity-90 transition-opacity cursor-pointer" onclick="togglePrintSelection('${item.name.replace(/'/g, "\\'")}')" title="Zaznacz/Odznacz do druku">
                                    ${imageArea}
                                </div>

                                <!-- Informacje o produkcie -->
                                <div class="p-5 flex flex-col flex-grow bg-white transition-colors">
                                    <div class="flex items-start justify-between mb-2 cursor-pointer group/title" onclick="window.open('${searchUrl}', '_blank')" title="Szukaj w Google: ${item.name}">
                                        <h3 class="text-lg font-bold text-gray-900 leading-tight pr-6 group-hover/title:text-blue-700 transition-colors inline-block w-full">${item.name}</h3>
                                        <i data-lucide="external-link" class="w-4 h-4 text-blue-400 opacity-0 group-hover/title:opacity-100 transition-opacity mt-1 flex-shrink-0 print-hide"></i>
                                    </div>
                                    <p class="text-sm text-gray-600 mb-4 flex-grow">${item.desc}</p>
                                    
                                    <div class="mt-auto pt-4 border-t border-gray-100">
                                        <ul class="flex flex-wrap gap-2">
                                            ${featuresHtml}
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        `;
                    });

                    htmlContent += `
                            </div>
                        </div>
                    `;
                });

                htmlContent += `
                        </div>
                    </div>
                `;
            });

            container.innerHTML = htmlContent;

            // Re-inicjalizacja ikon po zmianie DOM
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }

            // Automatyczne odświeżenie dedykowanego widoku do druku (na wypadek Ctrl+P)
            let itemsToPrint = [];
            processedData.forEach(dept => {
                dept.categories.forEach(cat => {
                    itemsToPrint.push(...cat.items);
                });
            });
            generatePrintView(itemsToPrint, "Katalog Sprzętu OWiT Toruń (Filtrowany)");
        }

        function initFilters() {
            const filterSelect = document.getElementById('filterSelect');
            if (!filterSelect) return;
            catalogData.forEach((department, idx) => {
                const option = document.createElement('option');
                option.value = idx.toString();
                // Oczyszczamy string z początkowego emoji i spacji, jeśli to możliwe, lub używamy całości
                option.textContent = department.departmentTitle;
                filterSelect.appendChild(option);
            });
            populateCategoryFilter(); // Call populateCategoryFilter initially
        }

        // Inicjalizacja i obsługa zdarzeń
        initFilters();
        renderCatalog();

        document.getElementById('searchInput')?.addEventListener('input', (e) => {
            currentSearchQuery = e.target.value;
            renderCatalog();
        });

        document.getElementById('filterSelect')?.addEventListener('change', (e) => {
            currentFilter = e.target.value;
            populateCategoryFilter();
            renderCatalog();
        });

        document.getElementById('categorySelect')?.addEventListener('change', (e) => {
            currentCategoryFilter = e.target.value;
            renderCatalog();
        });

        document.getElementById('sortSelect')?.addEventListener('change', (e) => {
            currentSort = e.target.value;
            renderCatalog();
        });
    </script>
</body>

</html>
